let currentIndex = 0;
let secondsElapsed = 0;
let timerInterval;
let playerName = "";

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function startGame() {
    playerName = document.getElementById("player-name").value.trim();
    if (!playerName) {
        alert("ദയവായി പേര് ടൈപ്പ് ചെയ്യുക!");
        return;
    }
    
    shuffle(quizData);
    currentIndex = 0;
    secondsElapsed = 0;
    
    // ആകെ ചോദ്യങ്ങളുടെ എണ്ണം ഇവിടെ കാണിക്കുന്നു
    document.getElementById("total-q").innerText = quizData.length;
    
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    
    timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById("seconds").innerText = secondsElapsed;
    }, 1000);
    
    showQuestion();
}

function showQuestion() {
    let q = quizData[currentIndex];
    document.getElementById("q-no").innerText = currentIndex + 1;
    document.getElementById("question").innerText = q.q;
    
    let optDiv = document.getElementById("options");
    optDiv.innerHTML = "";
    
    let options = [...q.o];
    shuffle(options);
    
    options.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "btn option-btn";
        btn.innerText = opt;
        btn.onclick = () => {
            if (opt === q.a) {
                currentIndex++;
                if (currentIndex < quizData.length) showQuestion();
                else showWin();
            } else {
                gameOver(q.a);
            }
        };
        optDiv.appendChild(btn);
    });
}

function gameOver(correct) {
    clearInterval(timerInterval);
    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("error-screen").classList.remove("hidden");
    document.getElementById("fail-msg").innerHTML = `തെറ്റായ ഉത്തരം! <br><br> ശരിയായ ഉത്തരം: <br> <b style="color:#009688;">${correct}</b>`;
}

function showWin() {
    clearInterval(timerInterval);
    
    let now = new Date();
    let dateStr = now.toLocaleDateString('ml-IN');
    let timeStr = now.toLocaleTimeString('ml-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("win-screen").classList.remove("hidden");
    
    document.getElementById("final-name").innerText = playerName;
    document.getElementById("final-date").innerText = dateStr;
    document.getElementById("final-clock").innerText = timeStr;
    document.getElementById("final-duration").innerText = secondsElapsed;
}
</script>
